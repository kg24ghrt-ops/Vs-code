name: Android CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3️⃣ Ensure gradlew is executable
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4️⃣ Force delete KAPT stubs to avoid duplicate class issues
      - name: Delete KAPT generated stubs
        run: rm -rf app/build/tmp/kapt3/

      # 5️⃣ Clean project
      - name: Clean project
        run: ./gradlew clean

      # 6️⃣ Build everything in a single step (no daemon, no incremental KAPT)
      - name: Build Debug + Release + Run Unit Tests
        run: ./gradlew build --no-build-cache --no-daemon

      # 7️⃣ Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 8️⃣ Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      # 9️⃣ Optional: Run ktlint checks
      - name: Run ktlint
        run: ./gradlew ktlintCheck