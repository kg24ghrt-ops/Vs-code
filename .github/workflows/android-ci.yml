name: Android CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK 17 (matches your build.gradle.kts)
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3️⃣ Ensure gradlew is executable
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4️⃣ Clean project + Gradle cache to avoid CI metadata issues
      - name: Clean project
       run: ./gradlew clean

      # 5️⃣ Build everything in a single step to prevent duplicate KAPT runs
      - name: Build Debug + Release + Run Unit Tests
        run: ./gradlew build --no-build-cache

      # 6️⃣ Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 7️⃣ Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      # 8️⃣ Optional: Run lint or ktlint checks
      - name: Run ktlint
        run: ./gradlew ktlintCheck

      # 9️⃣ Optional: Print build scan link (if enabled)
      # - name: Build scan
      #   run: ./gradlew build --scan