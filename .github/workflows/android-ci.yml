name: Android CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    # 🔥 CRITICAL FIX: Clean everything
    - name: Clean project
      run: |
        ./gradlew clean
        rm -rf ~/.gradle/caches/

    # 🔥 Single build command (prevents duplicate KAPT runs)
    - name: Build (Debug + Release + Tests)
      run: ./gradlew build --no-build-cache

    # Upload artifacts
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk